<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Limão</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #212529; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; border-top: 5px solid #ffc107; }
        .logo-box { font-size: 3rem; text-align: center; margin-bottom: 10px; }
    </style>
    <script type="module" src="auth.js"></script>
</head>
<body>

    <div class="login-card">
        <div class="logo-box">🍋</div>
        <h3 class="text-center fw-bold text-dark mb-1">Sistema Limão</h3>
        <p class="text-center text-muted small mb-4">Acesso restrito</p>

        <form id="form-login">
            <div class="mb-3">
                <label class="form-label fw-bold small text-muted">Usuário</label>
                <input type="text" id="user" class="form-control form-control-lg bg-light" placeholder="Digite seu usuário" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold small text-muted">Senha</label>
                <input type="password" id="pass" class="form-control form-control-lg bg-light" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold shadow-sm">Entrar no Sistema</button>
        </form>
    </div>

    <script type="module" src="app-login.js"></script>
</body>
</html>
